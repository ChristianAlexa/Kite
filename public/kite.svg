<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <!-- kite diamond -->
  <g transform="translate(256 200) rotate(15)">
    <polygon points="0,-120 90,0 0,120 -90,0" fill="#ffffff"/>
    <polygon points="0,-120 90,0 0,0" fill="#fde047"/>
    <polygon points="0,120 -90,0 0,0" fill="#fb7185"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#0f172a" stroke-width="6"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#0f172a" stroke-width="6"/>
  </g>
  <!-- tail -->
  <path d="M256 322 q -30 40 10 70 q 40 30 0 70" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
</svg>
